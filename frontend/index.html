<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Vector Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Edge Web Crawler & Vector Space Engine</h2>

    <div class="panel">
        <span class="label">1. Cluster Discovery Pipeline</span>
        <div class="input-group">
            <input type="text" id="crawlInput" placeholder="Enter target site URL (e.g., https://example.com)">
            <button class="btn-crawl" onclick="executeCrawl()">Crawl & Index</button>
        </div>
        <div id="crawlStatus" class="status">System idle. Ready to analyze mapping arrays.</div>
    </div>

    <div class="panel">
        <span class="label">2. Search Vector Target</span>
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Enter semantic query tokens...">
            <button class="btn-search" onclick="executeSearch()">Query Index</button>
        </div>
        <div id="searchStatus" class="status">Awaiting query matrix input parameters.</div>
    </div>

    <div id="searchResults"></div>

    <script src="app.js"></script>
</body>
</html>
